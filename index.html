<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCARAB'S CURSE: THE FINAL BATTLE</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher:wght@400;700&display=swap');

    body { margin:0; overflow:hidden; font-family: 'Philosopher', sans-serif; background:#000; }
    
    #game { 
        width:100vw; height:100vh; position:relative; 
        background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%),
                    url("bg.png") center/cover no-repeat; 
        display: none; 
    }

    #overlayStart, #overlayQuestion, #overlayEnd, #overlayGameOver {
        position:fixed; inset:0; background:rgba(0,0,0,0.9); 
        display:flex; justify-content:center; align-items:center; flex-direction:column;
        z-index:2000; color:#ffd700; text-align:center; padding: 20px;
    }

    /* Увеличили z-index для всех элементов игрового поля */
    #snakePath { position:absolute; inset:0; z-index:5; opacity: 0.6; pointer-events: none; }
    #hatch { position:absolute; width:130px; height:130px; transform:translate(-50%,-50%); z-index:6; filter: drop-shadow(0 0 15px #ffd700); }
    .ball { position:absolute; width:64px; height:64px; transform:translate(-50%,-50%); z-index:15; }
    
    #frogWrapper { position:absolute; bottom:10px; left:50%; width:150px; height:150px; margin-left:-75px; z-index:100; }
    #frog { width:150px; height:150px; cursor:pointer; filter: drop-shadow(0 0 15px gold); will-change: transform; }

    .bonus-coin { filter: drop-shadow(0 0 20px #00ff00) brightness(1.5) !important; animation: bonusPulse 1s ease-in-out infinite alternate !important; }
    .freeze-coin { filter: drop-shadow(0 0 20px #00d4ff) brightness(1.5) !important; animation: bonusPulse 0.8s ease-in-out infinite alternate !important; }
    .frozen { filter: saturate(0.2) brightness(1.2) drop-shadow(0 0 10px #00d4ff) !important; opacity: 0.8; }

    @keyframes bonusPulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.2); } }

    #livesContainer { position: absolute; top: 20px; left: 30px; display: flex; gap: 15px; z-index: 150; }
    .ankh { width: 55px; height: 55px; filter: brightness(1.5) drop-shadow(0 0 12px #ffd700); }
    .ankh.lost { opacity: 0; transform: scale(0); transition: 0.5s; }

    .gold-title { font-family: 'Cinzel Decorative'; font-size: 48px; text-shadow: 0 0 30px gold; margin-bottom: 20px; }
    .story-text { font-size: 20px; color: #fff; max-width: 700px; line-height: 1.5; margin-bottom: 25px; }

    .answerBtn { background: linear-gradient(#4a3b0a, #1a1403); border: 2px solid #ffd700; padding:15px 40px; margin:10px; font-size:24px; cursor:pointer; color: #fff; border-radius:8px; width:340px; transition: 0.3s; font-family: 'Philosopher'; }
    .answerBtn:hover { background: #ffd700; color: #000; transform: scale(1.05); }

    #progressBar { position:absolute; top:25px; left:50%; transform:translateX(-50%); width:40%; height:20px; background: rgba(0,0,0,0.5); border: 2px solid #ffd700; border-radius:10px; overflow:hidden; z-index:150; }
    #progressFill { height:100%; width:0%; background: linear-gradient(to right, #b8860b, #ffd700); transition:width 0.3s; }
    
    #volumeControl { position: absolute; top: 25px; right: 30px; z-index: 2500; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 30px; border: 1px solid #ffd700; }
    input[type=range] { cursor: pointer; accent-color: #ffd700; width: 70px; }
</style>
</head>
<body>

<div id="volumeControl">
    <span style="color:gold;">♪</span>
    <input type="range" id="volRange" min="0" max="1" step="0.1" value="0.5">
</div>

<div id="overlayStart">
    <h1 class="gold-title">THE FINAL SEAL</h1>
    <p class="story-text">
        Apophis has blocked the Treasury with cursed gold! <br>
        <b>Destroy the golden barrier to release the Sun Barge and save Egypt!</b>
    </p>
    <button class="answerBtn" onclick="startGame()">BEGIN FINAL BATTLE</button>
</div>

<div id="game">
    <canvas id="snakePath"></canvas>
    <img src="3.png" id="hatch">
    
    <div id="livesContainer">
        <img src="2.png" class="ankh" id="h1">
        <img src="2.png" class="ankh" id="h2">
        <img src="2.png" class="ankh" id="h3">
    </div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="frogWrapper"><img src="1.png" id="frog"></div>

    <div id="overlayQuestion" style="display:none;">
        <div id="qText" style="font-size: 28px; color: #fff; margin-bottom: 30px; text-align:center;"></div>
        <div id="answers"></div>
    </div>

    <div id="overlayEnd" style="display:none;">
        <h1 class="gold-title">THE SUN RISES!</h1>
        <p class="story-text">The curse is lifted! The artifacts are recovered and the Sun Barge sails again!</p>
        <button class="answerBtn" onclick="location.reload()">CLAIM YOUR REWARD</button>
    </div>

    <div id="overlayGameOver" style="display:none;">
        <h1 class="gold-title" style="color: #ff4500;">CURSED BY GOLD</h1>
        <button class="answerBtn" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
const sndShot = new Audio('1.mp3'), sndWrong = new Audio('2.mp3'), sndCorrect = new Audio('3.mp3'), sndWin = new Audio('4.mp3'), sndGameOver = new Audio('5.mp3');
let gameStarted = false, gameActive = true, errors = 0, isFrozen = false;
const MAX_ERRORS = 3, SNAKE_SIZE = 15, MIN_DIST = 50, BASE_SPEED = 0.5;

const COIN_VARIATIONS = ["4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png"];
const QUESTIONS_POOL = [
{q: "The Sun is ______ than the Moon.", c: "brighter", w: ["bright", "the brightest"]},
    {q: "Apophis is the ______ snake in the world.", c: "most dangerous", w: ["dangerous", "more dangerous"]},
    {q: "Ra's magic is ______ than any curse.", c: "stronger", w: ["strong", "strongest"]},
    {q: "This is ___ ancient artifact of power.", c: "an", w: ["a", "the"]},
    {q: "The Great Pyramid is ___ tallest structure.", c: "the", w: ["a", "an"]},
    {q: "Wisdom is ______ than gold.", c: "more precious", w: ["precious", "most precious"]},
    {q: "Ancient Egypt is ______ than Rome.", c: "older", w: ["old", "oldest"]},
    {q: "You are the ______ hero of the Nile!", c: "bravest", w: ["brave", "braver"]},
    {q: "A scarab is ______ than a snake.", c: "smaller", w: ["small", "smallest"]},
    {q: "Is that ___ oasis in the distance?", c: "an", w: ["a", "the"]},
    {q: "The Nile is the ______ river in Africa.", c: "longest", w: ["long", "longer"]},
    {q: "Darkness is ______ than light today.", c: "worse", w: ["bad", "worst"]},
    {q: "This quest is ______ than I thought.", c: "more difficult", w: ["difficult", "most difficult"]},
    {q: "Ra has ___ golden crown.", c: "a", w: ["an", "the"]},
    {q: "The stars are ______ than the fire.", c: "further", w: ["far", "farther"]}
];
let questionsLeft = [...QUESTIONS_POOL];

const game = document.getElementById("game"), frog = document.getElementById("frog"), hatch = document.getElementById("hatch"), canvas = document.getElementById("snakePath"), ctx = canvas.getContext("2d");
let W, H, path = [], snake = [];

function drawTrack() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    ctx.clearRect(0,0,W,H);
    ctx.beginPath(); 
    ctx.strokeStyle = "rgba(255, 215, 0, 0.4)"; 
    ctx.lineWidth = 45;
    path = [];
    for (let t = 0; t <= 1; t += 0.001) {
        let x = W * 0.1 + (W * 0.8) * t, y = H * 0.4 + Math.sin(t * Math.PI * 2.5) * (H * 0.25);
        path.push({ x, y });
        if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    const lastP = path[path.length - 1];
    hatch.style.left = lastP.x + "px"; hatch.style.top = lastP.y + "px";
}

function startGame() {
    document.getElementById("overlayStart").style.display = "none";
    game.style.display = "block";
    
    // Сначала рисуем путь
    drawTrack();
    
    // Создаем монетки
    snake = [];
    for (let i = 0; i < SNAKE_SIZE; i++) {
        let e = document.createElement("img");
        e.src = COIN_VARIATIONS[Math.floor(Math.random() * COIN_VARIATIONS.length)];
        e.className = "ball";
        e.style.left = "-100px"; e.style.top = "-100px"; // Спрятать до начала движения
        
        let type = "normal";
        let rand = Math.random();
        if (i > 4 && rand < 0.15) { type = "freeze"; e.classList.add("freeze-coin"); }
        else if (i > 4 && rand < 0.30) { type = "bonus"; e.classList.add("bonus-coin"); }
        
        game.appendChild(e);
        snake.push({ pos: -i * MIN_DIST, el: e, type: type });
    }
    
    gameStarted = true;
    move(); // Запускаем цикл движения только здесь
}

function move() {
    if (!gameStarted) return;
    
    let allGone = true;
    snake.forEach((s, i) => {
        let moveStep = gameActive ? (isFrozen ? 0 : BASE_SPEED) : BASE_SPEED * 25;
        if (i === 0) s.pos += moveStep;
        else s.pos += ((snake[i-1].pos - MIN_DIST) - s.pos) * 0.2;
        
        if (s.pos < path.length - 1) {
            if (s.pos > 0) {
                allGone = false;
                let p = path[Math.floor(s.pos)];
                if (p) { 
                    s.el.style.left = p.x + "px"; 
                    s.el.style.top = p.y + "px"; 
                }
            }
        } else {
            s.el.style.display = "none";
        }
    });

    if (gameActive && snake.length > 0) {
        // Проверка проигрыша
        if (snake[0].pos >= path.length - 1) {
            gameActive = false;
            sndGameOver.play();
        }
        
        // Поворот скарабея
        let leadCoin = snake.find(s => s.pos > 0) || snake[0];
        const rect = frog.getBoundingClientRect(), centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        const angle = Math.atan2(parseFloat(leadCoin.el.style.top) - centerY, parseFloat(leadCoin.el.style.left) - centerX);
        frog.style.transform = `rotate(${angle * (180 / Math.PI) + 90}deg)`;
    }

    if (!gameActive && allGone) {
        document.getElementById("overlayGameOver").style.display = "flex";
        return;
    }

    requestAnimationFrame(move);
}

// Остальная логика (клик, стрельба и т.д.) остается без изменений
frog.onclick = () => {
    if (!gameActive) return;
    sndShot.play();
    if (questionsLeft.length === 0) questionsLeft = [...QUESTIONS_POOL];
    const qIdx = Math.floor(Math.random() * questionsLeft.length);
    const q = questionsLeft.splice(qIdx, 1)[0];
    const overlayQ = document.getElementById("overlayQuestion");
    overlayQ.style.display = "flex";
    document.getElementById("qText").textContent = q.q;
    const container = document.getElementById("answers");
    container.innerHTML = "";
    [q.c, ...q.w].sort(() => Math.random() - 0.5).forEach(a => {
        let btn = document.createElement("button");
        btn.className = "answerBtn"; btn.textContent = a;
        btn.onclick = () => {
            overlayQ.style.display = "none";
            if (a === q.c) { sndCorrect.play(); shoot(false); }
            else { sndWrong.play(); handleError(); shoot(true); }
        };
        container.appendChild(btn);
    });
};

function handleError() {
    errors++;
    const heart = document.getElementById("h" + (4 - errors));
    if (heart) heart.classList.add("lost");
    if (errors >= MAX_ERRORS) { gameActive = false; sndGameOver.play(); }
}

function shoot(isMiss) {
    const ball = document.createElement("img");
    let targetIdx = snake.findIndex(s => s.pos > 0);
    if (targetIdx === -1) targetIdx = 0;
    ball.src = COIN_VARIATIONS[0]; ball.style.position = "absolute"; ball.style.width = "50px"; ball.style.zIndex = "20";
    const fRect = frog.getBoundingClientRect();
    ball.style.left = (fRect.left + fRect.width/2 - 25) + "px";
    ball.style.top = (fRect.top + fRect.height/2 - 25) + "px";
    game.appendChild(ball);
    
    let tx = parseFloat(snake[targetIdx].el.style.left), ty = parseFloat(snake[targetIdx].el.style.top);
    ball.animate([{ top: ball.style.top, left: ball.style.left }, { top: ty + "px", left: tx + "px" }], 400).onfinish = () => {
        ball.remove();
        if (!isMiss && snake.length > 0) {
            snake[targetIdx].el.remove();
            snake.splice(targetIdx, 1);
            document.getElementById("progressFill").style.width = ((SNAKE_SIZE - snake.length)/SNAKE_SIZE * 100) + "%";
            if (snake.length === 0) {
                gameActive = false;
                sndWin.play();
                setTimeout(() => document.getElementById("overlayEnd").style.display = "flex", 1000);
            }
        }
    };
}

document.getElementById("volRange").oninput = (e) => {
    [sndShot, sndWrong, sndCorrect, sndWin, sndGameOver].forEach(s => s.volume = e.target.value);
};

window.addEventListener('resize', drawTrack);
</script>
</body>
</html>
