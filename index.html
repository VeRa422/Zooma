<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCARAB'S CURSE: FULL QUEST</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher:wght@400;700&display=swap');
    body { margin:0; overflow:hidden; font-family: 'Philosopher', sans-serif; background:#000; }
    #game { width:100vw; height:100vh; position:relative; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%), url("bg.png") center/cover no-repeat; display: none; }
    #overlayStart, #overlayQuestion, #overlayEnd, #overlayGameOver { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:1000; color:#ffd700; text-align:center; padding: 20px; }
    #overlayQuestion { background: rgba(0, 0, 0, 0.8); }
    #snakePath { position:absolute; width:100%; height:100%; z-index:1; opacity: 0.4; }
    #frog { position:absolute; width:150px; height:150px; left: 50%; bottom: 10px; margin-left: -75px; z-index:100; cursor:pointer; filter: drop-shadow(0 0 15px gold); transition: transform 0.1s; }
    .ball { position:absolute; width:64px; height:64px; transform:translate(-50%,-50%); z-index:10; }
    #hatch { position:absolute; width:130px; height:130px; transform:translate(-50%,-50%); z-index:5; filter: drop-shadow(0 0 10px gold); }
    #livesContainer { position: absolute; top: 20px; left: 30px; display: flex; gap: 15px; z-index: 100; }
    .ankh { width: 55px; height: 55px; filter: brightness(1.5) drop-shadow(0 0 12px #ffd700); transition: 0.4s; }
    .ankh.lost { transform: scale(0) rotate(90deg); opacity: 0; }
    .gold-title { font-family: 'Cinzel Decorative'; font-size: 50px; text-shadow: 0 0 30px gold; margin-bottom: 20px; }
    .answerBtn { background: linear-gradient(#4a3b0a, #1a1403); border: 2px solid #ffd700; padding:15px 40px; margin:10px; font-size:24px; cursor:pointer; color: #fff; border-radius:8px; width:360px; transition: 0.3s; }
    .answerBtn:hover { background: #ffd700; color: #000; transform: scale(1.05); }
    #progressBar { position:absolute; top:25px; left:50%; transform:translateX(-50%); width:40%; height:20px; background: rgba(255,215,0,0.1); border: 2px solid #ffd700; border-radius:10px; overflow:hidden; z-index:50; }
    #progressFill { height:100%; width:0%; background: linear-gradient(to right, #b8860b, #ffd700); transition:width 0.3s; }
    .shotBall { position:absolute; width:50px; height:50px; z-index:150; filter: brightness(1.2) drop-shadow(0 0 15px gold); }
    @keyframes triumphDance { 0% { transform: rotate(var(--last-rot)) scale(1); } 50% { transform: rotate(calc(var(--last-rot) + 180deg)) scale(1.4); } 100% { transform: rotate(calc(var(--last-rot) + 360deg)) scale(1.5); } }
    .frog-triumph { animation: triumphDance 1s ease-in-out infinite !important; }
</style>
</head>
<body>
<div id="overlayStart"><h1 class="gold-title">SCARAB'S QUEST</h1><button class="answerBtn" onclick="startGame()">BEGIN</button></div>
<div id="game">
    <canvas id="snakePath"></canvas>
    <div id="livesContainer"><img src="2.png" class="ankh" id="h1"><img src="2.png" class="ankh" id="h2"><img src="2.png" class="ankh" id="h3"></div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="frogWrapper" style="position:absolute; bottom:10px; left:50%; width:150px; height:150px; margin-left:-75px; z-index:100;"><img src="1.png" id="frog"></div>
    <img src="3.png" id="hatch">
    <div id="overlayQuestion" style="display:none;"><h1 class="gold-title" id="qText" style="font-size:28px; padding:0 20px;"></h1><div id="answers"></div></div>
    <div id="overlayEnd" style="display:none;"><h1 class="gold-title">PHARAOH'S VICTORY!</h1><button class="answerBtn" onclick="location.reload()">PLAY AGAIN</button></div>
    <div id="overlayGameOver" style="display:none;"><h1 class="gold-title" style="color: #ff4500;">CURSED!</h1><button class="answerBtn" onclick="location.reload()">TRY AGAIN</button></div>
</div>
<script>
const sndShot = new Audio('1.mp3'), sndWrong = new Audio('2.mp3'), sndCorrect = new Audio('3.mp3'), sndWin = new Audio('4.mp3'), sndGameOver = new Audio('5.mp3');
let gameStarted = false, gameActive = true, errors = 0, isPausedForQuestion = false;
const MAX_ERRORS = 3, SNAKE_SIZE = 15, MIN_DIST = 55, BASE_SPEED = 0.5;

// ТВОЙ ПОЛНЫЙ СПИСОК ИЗ 12 ВОПРОСОВ
const QUESTIONS_POOL = [
    {q: "The Sun is ______ than the Moon.", c: "brighter", w: ["bright", "the brightest"]},
    {q: "Apophis is the ______ snake.", c: "most dangerous", w: ["dangerous", "more dangerous"]},
    {q: "Ra's magic is ______ than any curse.", c: "stronger", w: ["strong", "strongest"]},
    {q: "Ancient Egypt is ______ than Rome.", c: "older", w: ["old", "oldest"]},
    {q: "You are the ______ hero of the Nile!", c: "bravest", w: ["brave", "braver"]},
    {q: "Gold is ______ than sand.", c: "heavier", w: ["heavy", "heaviest"]},
    {q: "The Sphinx is ______ than a cat.", c: "bigger", w: ["big", "biggest"]},
    {q: "The Nile is the ______ river.", c: "longest", w: ["long", "longer"]},
    {q: "This pyramid is ______ than that house.", c: "taller", w: ["tall", "the tallest"]},
    {q: "Summer in Egypt is ______ than in London.", c: "hotter", w: ["hot", "the hottest"]},
    {q: "An elephant is ______ than a scarab.", c: "larger", w: ["large", "largest"]},
    {q: "The desert is ______ than the forest.", c: "drier", w: ["dry", "driest"]}
];
let currentQuestions = [...QUESTIONS_POOL];

const game = document.getElementById("game"), frog = document.getElementById("frog"), hatch = document.getElementById("hatch"), canvas = document.getElementById("snakePath"), ctx = canvas.getContext("2d");
let W = window.innerWidth, H = window.innerHeight, path = [], snake = [];

function drawTrack() {
    canvas.width = W; canvas.height = H; ctx.clearRect(0,0,W,H); ctx.beginPath(); ctx.strokeStyle = "rgba(255, 215, 0, 0.3)"; ctx.lineWidth = 45; path = [];
    for (let t = 0; t <= 1; t += 0.001) {
        let x = W * 0.1 + (W * 0.8) * t, y = H * 0.4 + Math.sin(t * Math.PI * 2.5) * (H * 0.25);
        path.push({ x, y }); if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke(); const lastP = path[path.length - 1]; hatch.style.left = lastP.x + "px"; hatch.style.top = lastP.y + "px";
}

function startGame() {
    [sndShot, sndWrong, sndCorrect, sndWin, sndGameOver].forEach(s => { s.play().then(()=>s.pause()); });
    document.getElementById("overlayStart").style.display = "none"; game.style.display = "block"; drawTrack();
    for (let i = 0; i < SNAKE_SIZE; i++) {
        let e = document.createElement("img"); e.src = (i % 7 + 4) + ".png"; e.className = "ball";
        game.appendChild(e); snake.push({ pos: -i * MIN_DIST, el: e });
    }
    gameStarted = true; move();
}

function move() {
    if (!gameStarted) return;
    let allGone = true;
    let moveStep = isPausedForQuestion ? 0 : (gameActive ? BASE_SPEED : BASE_SPEED * 25);
    snake.forEach((s, i) => {
        if (i === 0) s.pos += moveStep; else s.pos += ((snake[i-1].pos - MIN_DIST) - s.pos) * 0.2;
        if (s.pos < path.length - 1) {
            if (s.pos > 0) { allGone = false; let p = path[Math.floor(s.pos)]; s.el.style.left = p.x + "px"; s.el.style.top = p.y + "px"; }
        } else s.el.style.display = "none";
    });
    if (gameActive && snake.length > 0) {
        if (snake[0].pos >= path.length - 1) triggerGameOver();
        let leadCoin = snake.find(s => s.pos > 0) || snake[0];
        const rect = frog.getBoundingClientRect(), centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        const tx = parseFloat(leadCoin.el.style.left) || 0, ty = parseFloat(leadCoin.el.style.top) || 0;
        frog.style.transform = `rotate(${Math.atan2(ty - centerY, tx - centerX) * (180 / Math.PI) + 90}deg)`;
    }
    if (!gameActive && allGone && errors >= MAX_ERRORS) { sndGameOver.pause(); document.getElementById("overlayGameOver").style.display = "flex"; return; }
    requestAnimationFrame(move);
}

frog.onclick = () => {
    if (!gameActive || isPausedForQuestion) return;
    sndShot.play(); isPausedForQuestion = true;
    if (currentQuestions.length === 0) currentQuestions = [...QUESTIONS_POOL];
    let qIdx = Math.floor(Math.random() * currentQuestions.length);
    let q = currentQuestions.splice(qIdx, 1)[0];
    const overlayQ = document.getElementById("overlayQuestion");
    overlayQ.style.display = "flex"; document.getElementById("qText").textContent = q.q;
    const container = document.getElementById("answers"); container.innerHTML = "";
    [q.c, ...q.w].sort(() => Math.random() - 0.5).forEach(a => {
        let btn = document.createElement("button"); btn.className = "answerBtn"; btn.textContent = a;
        btn.onclick = () => {
            overlayQ.style.display = "none"; isPausedForQuestion = false;
            if (a === q.c) { sndCorrect.play(); shoot(false); } else { sndWrong.play(); handleError(); shoot(true); }
        };
        container.appendChild(btn);
    });
};

function triggerGameOver() { if(!gameActive) return; gameActive = false; sndGameOver.play(); }
function handleError() { errors++; const h = document.getElementById("h" + (4 - errors)); if (h) h.classList.add("lost"); if (errors >= MAX_ERRORS) triggerGameOver(); }

function shoot(isMiss) {
    const ball = document.createElement("img");
    let targetIdx = snake.findIndex(s => s.pos > 0);
    if (targetIdx === -1) targetIdx = 0;
    if (isMiss) targetIdx = Math.min(targetIdx + 2, snake.length - 1);
    ball.src = "4.png"; ball.className = "shotBall";
    const fRect = frog.getBoundingClientRect();
    ball.style.left = (fRect.left + fRect.width/2 - 25) + "px"; ball.style.top = (fRect.top + fRect.height/2 - 25) + "px";
    game.appendChild(ball);
    let targetEl = snake[targetIdx].el;
    let tx = parseFloat(targetEl.style.left), ty = parseFloat(targetEl.style.top);
    ball.animate([{ left: ball.style.left, top: ball.style.top }, { left: tx + "px", top: ty + "px" }], 400).onfinish = () => {
        ball.remove();
        if (!isMiss && snake.length > 0) {
            snake[targetIdx].el.remove(); snake.splice(targetIdx, 1);
            document.getElementById("progressFill").style.width = ((SNAKE_SIZE - snake.length)/SNAKE_SIZE * 100) + "%";
            if (snake.length === 0) finishGame();
        }
    };
}

function finishGame() {
    gameActive = false;
    const currentRot = frog.style.transform.replace(/[^0-9.-]/g, '') || 0;
    frog.style.setProperty('--last-rot', currentRot + 'deg');
    frog.classList.add("frog-triumph"); sndWin.play();
    setTimeout(() => { document.getElementById("overlayEnd").style.display = "flex"; }, 2500);
}
window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; drawTrack(); });
</script>
</body>
</html>
