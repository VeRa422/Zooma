<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APOPHIS: THE SOLAR PATH</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher:wght@400;700&display=swap');

    body { margin:0; overflow:hidden; font-family: 'Philosopher', sans-serif; background:#000; }
    
    #game { 
        width:100vw; height:100vh; position:relative; 
        background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%),
                    url("bg.png") center/cover no-repeat; 
        display: none; 
    }

    .audio-control {
        position: absolute; top: 20px; right: 20px;
        display: flex; align-items: center; gap: 10px;
        background: rgba(0,0,0,0.6); padding: 8px 15px;
        border-radius: 30px; border: 1px solid #ffd700; z-index: 2000;
    }
    .audio-control label { color: #ffd700; font-size: 12px; font-family: 'Cinzel Decorative'; }
    input[type=range] { cursor: pointer; accent-color: #ffd700; width: 80px; }

    #overlayStart, #overlayQuestion, #overlayEnd, #overlayGameOver {
        position:fixed; inset:0; background:rgba(0,0,0,0.85); 
        display:flex; justify-content:center; align-items:center; flex-direction:column;
        z-index:3000; color:#ffd700; text-align:center;
    }

    #snakePath { position:absolute; inset:0; z-index:1; opacity: 0.2; }
    #frog { position:absolute; width:150px; height:150px; left: 50%; bottom: 20px; margin-left: -75px; z-index:1000; cursor:pointer; filter: drop-shadow(0 0 15px gold); }

    .ball { position:absolute; width:64px; height:64px; transform:translate(-50%,-50%); z-index:100; display: none; filter: drop-shadow(0 0 5px rgba(255,215,0,0.5)); }

    #livesContainer { position: absolute; top: 20px; left: 30px; display: flex; gap: 15px; z-index: 2000; }
    .ankh { width: 55px; height: 55px; filter: brightness(1.5) drop-shadow(0 0 12px #ffd700); transition: 0.4s; }
    .ankh.lost { transform: scale(0); opacity: 0; }

    #qText { font-family: 'Philosopher', sans-serif; font-size: 34px; color: #fff; text-transform: none; margin-bottom: 30px; text-shadow: 0 2px 10px #000; }

    .answerBtn { background: linear-gradient(#4a3b0a, #1a1403); border: 2px solid #ffd700; padding:15px; margin:10px; font-size:26px; cursor:pointer; color: #fff; border-radius:8px; width:340px; transition: 0.3s; font-family: 'Philosopher'; }
    .answerBtn:hover { background: #ffd700; color: #000; transform: scale(1.05); }

    #progressBar { position:absolute; top:25px; left:50%; transform:translateX(-50%); width:35%; height:15px; background: rgba(0,0,0,0.5); border: 1px solid #ffd700; border-radius:10px; overflow:hidden; z-index:2000; }
    #progressFill { height:100%; width:0%; background: linear-gradient(to right, #b8860b, #ffd700); transition:width 0.3s; }
    .shotBall { position:absolute; width:50px; height:50px; z-index:1500; filter: brightness(1.3) drop-shadow(0 0 20px gold); }
</style>
</head>
<body>

<div class="audio-control">
    <label>VOL</label>
    <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5">
</div>

<div id="overlayStart">
    <button class="answerBtn" style="font-size: 36px; width: 450px;" onclick="startGame()">START THE BATTLE</button>
</div>

<div id="game">
    <canvas id="snakePath"></canvas>
    <div id="livesContainer">
        <img src="2.png" class="ankh" id="h1">
        <img src="2.png" class="ankh" id="h2">
        <img src="2.png" class="ankh" id="h3">
    </div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <img src="1.png" id="frog">
    <img src="3.png" id="hatch" style="position:absolute; width:140px; height:140px; transform:translate(-50%,-50%); z-index:50;">

    <div id="overlayQuestion" style="display:none;">
        <div id="qText"></div>
        <div id="answers"></div>
    </div>
    
    <div id="overlayEnd" style="display:none;">
        <h1 style="font-family: 'Cinzel Decorative'; font-size: 50px; text-shadow: 0 0 20px gold;">THE SUN RISES!</h1>
        <button class="answerBtn" onclick="location.reload()">FINISH QUEST</button>
    </div>
    
    <div id="overlayGameOver" style="display:none;">
        <h1 style="font-family: 'Cinzel Decorative'; font-size: 50px; color: #ff4500;">DARKNESS WINS...</h1>
        <button class="answerBtn" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
const sndShot = new Audio('1.mp3'), sndWrong = new Audio('2.mp3'), sndCorrect = new Audio('3.mp3'), sndWin = new Audio('4.mp3'), sndGameOver = new Audio('5.mp3');

const volSlider = document.getElementById('vol-slider');
function updateVol() {
    const v = volSlider.value;
    [sndShot, sndWrong, sndCorrect, sndWin, sndGameOver].forEach(s => s.volume = v);
}
volSlider.addEventListener('input', updateVol); updateVol();

let gameStarted = false, gameActive = true, errors = 0;
const MAX_ERRORS = 3, SNAKE_SIZE = 12, MIN_DIST = 70, BASE_SPEED = 0.8;

const COIN_VARIATIONS = ["4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png"];

const QUESTIONS_POOL = [
    {q: "The Sun is ______ than the moon.", c: "brighter", w: ["bright", "brightest"]},
    {q: "Apophis is the ______ snake.", c: "most dangerous", w: ["dangerous", "danger"]},
    {q: "This fight is ______ than the last.", c: "harder", w: ["hard", "hardest"]},
    {q: "Ra's magic is the ______.", c: "most powerful", w: ["powerful", "power"]},
    {q: "Night is ______ than day.", c: "darker", w: ["dark", "darkest"]},
    {q: "Wisdom is ______ than gold.", c: "more important", w: ["important", "most important"]},
    {q: "The Nile is ______ than this lake.", c: "wider", w: ["wide", "widest"]},
    {q: "The desert is the ______ place.", c: "hottest", w: ["hot", "hotter"]},
    {q: "The stars are ______ than the fire.", c: "further", w: ["far", "fast"]},
    {q: "This is the ______ treasure!", c: "best", w: ["good", "better"]},
    {q: "Anubis is ______ than a mortal.", c: "older", w: ["old", "oldest"]},
    {q: "I see ___ ancient star.", c: "an", w: ["a", "the"]}
];

let activeQuestions = [];
function shuffleQuestions() { activeQuestions = [...QUESTIONS_POOL].sort(() => Math.random() - 0.5); }

const game = document.getElementById("game"), frog = document.getElementById("frog"), hatch = document.getElementById("hatch"), canvas = document.getElementById("snakePath"), ctx = canvas.getContext("2d");
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

let path = [], snake = [];

function drawTrack() {
    ctx.clearRect(0,0,W,H);
    ctx.beginPath(); ctx.strokeStyle = "rgba(255, 215, 0, 0.1)"; ctx.lineWidth = 50;
    path = [];
    // Траектория
    for (let t = 0; t <= 1; t += 0.001) {
        let x = W * 0.1 + (W * 0.8) * t, y = H * 0.4 + Math.sin(t * Math.PI * 2.5) * (H * 0.25);
        path.push({ x, y });
        if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    const lastP = path[path.length - 1];
    hatch.style.left = lastP.x + "px"; hatch.style.top = lastP.y + "px";
}

function startGame() {
    document.getElementById("overlayStart").style.display = "none";
    game.style.display = "block";
    gameStarted = true;
    shuffleQuestions();
    drawTrack();
    
    for (let i = 0; i < SNAKE_SIZE; i++) {
        let e = document.createElement("img");
        e.src = COIN_VARIATIONS[Math.floor(Math.random() * COIN_VARIATIONS.length)];
        e.className = "ball";
        game.appendChild(e);
        // Выстраиваем их в очередь за пределами экрана
        snake.push({ pos: -i * MIN_DIST, el: e });
    }
    move();
}

function updateScarabRotation() {
    if (!gameActive || snake.length === 0) return;
    let targetCoin = snake.find(s => s.pos > 0) || snake[0];
    const tx = parseFloat(targetCoin.el.style.left) || W/2, ty = parseFloat(targetCoin.el.style.top) || H/2;
    const rect = frog.getBoundingClientRect(), cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const angle = Math.atan2(ty - cy, tx - cx);
    frog.style.transform = `rotate(${angle * (180 / Math.PI) + 90}deg)`;
}

function move() {
    if (!gameStarted) return;
    let allFinished = true;
    
    snake.forEach((s, i) => {
        let speed = gameActive ? BASE_SPEED : BASE_SPEED * 25;
        
        // Логика следования за головой
        if (i === 0) s.pos += speed;
        else s.pos += ((snake[i-1].pos - MIN_DIST) - s.pos) * 0.15;
        
        if (s.pos > 0 && s.pos < path.length - 1) {
            allFinished = false;
            let p = path[Math.floor(s.pos)];
            if (p) {
                s.el.style.left = p.x + "px";
                s.el.style.top = p.y + "px";
                s.el.style.display = "block"; // Показываем, когда вошли на путь
            }
        } else if (s.pos <= 0) {
            allFinished = false; // Еще не выехали
        } else {
            s.el.style.display = "none"; // Ушли в нору
        }
    });

    // Проверка проигрыша (голова дошла до конца)
    if (gameActive && snake[0].pos >= path.length - 2) {
        gameActive = false;
        sndGameOver.play();
    }

    if (!gameActive && allFinished) {
        if (snake.length > 0) document.getElementById("overlayGameOver").style.display = "flex";
        return;
    }

    if (gameActive) updateScarabRotation();
    requestAnimationFrame(move);
}

frog.onclick = () => {
    if (!gameActive) return;
    sndShot.play();
    if (activeQuestions.length === 0) shuffleQuestions();
    let q = activeQuestions.pop();

    const overlayQ = document.getElementById("overlayQuestion");
    overlayQ.style.display = "flex";
    document.getElementById("qText").textContent = q.q;
    const container = document.getElementById("answers");
    container.innerHTML = "";
    
    [q.c, ...q.w].sort(() => Math.random() - 0.5).forEach(a => {
        let btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = a;
        btn.onclick = () => {
            overlayQ.style.display = "none";
            if (a === q.c) { sndCorrect.play(); shoot(false); }
            else { sndWrong.play(); handleError(); shoot(true); }
        };
        container.appendChild(btn);
    });
};

function handleError() {
    errors++;
    const heart = document.getElementById("h" + (4 - errors));
    if (heart) heart.classList.add("lost");
    if (errors >= MAX_ERRORS) { gameActive = false; sndGameOver.play(); }
}

function shoot(isMiss) {
    const ball = document.createElement("img");
    ball.src = "4.png"; ball.className = "shotBall";
    const rect = frog.getBoundingClientRect();
    ball.style.left = (rect.left + rect.width/2 - 25) + "px";
    ball.style.top = (rect.top + rect.height/2 - 25) + "px";
    game.appendChild(ball);

    // Ищем ближайшую видимую монетку
    let targetIdx = snake.findIndex(s => s.pos > 0);
    if (targetIdx === -1) targetIdx = 0;
    if (isMiss) targetIdx = Math.min(targetIdx + 2, snake.length - 1);

    let tx = parseFloat(snake[targetIdx].el.style.left) || W/2;
    let ty = parseFloat(snake[targetIdx].el.style.top) || H/2;

    ball.animate([{ left: ball.style.left, top: ball.style.top }, { left: tx + "px", top: ty + "px" }], 300).onfinish = () => {
        ball.remove();
        if (!isMiss && snake.length > 0) {
            snake[targetIdx].el.remove();
            snake.splice(targetIdx, 1);
            document.getElementById("progressFill").style.width = ((SNAKE_SIZE - snake.length)/SNAKE_SIZE * 100) + "%";
            if (snake.length === 0) {
                gameActive = false;
                sndWin.play();
                document.getElementById("overlayEnd").style.display = "flex";
            }
        }
    };
}

window.addEventListener('resize', () => { 
    W = window.innerWidth; H = window.innerHeight; 
    canvas.width = W; canvas.height = H; 
    drawTrack(); 
});
</script>
</body>
</html>
